<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsClassifier | Secure Workspace Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ══ THEME TOKENS ══ */
        :root[data-theme="dark"] {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: rgba(248, 250, 252, 0.5);
            --accent-glow: rgba(168, 85, 247, 0.4);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-color: #fff;
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --toggle-bg: rgba(255, 255, 255, 0.08);
            --toggle-border: rgba(255, 255, 255, 0.15);
            --particle-color: rgba(168, 85, 247, 0.1);
        }

        :root[data-theme="light"] {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-gradient: linear-gradient(180deg, #f0f4ff 0%, #e8d5ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(99, 102, 241, 0.15);
            --text-main: #1e1b4b;
            --text-dim: rgba(30, 27, 75, 0.55);
            --accent-glow: rgba(168, 85, 247, 0.25);
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-color: #1e1b4b;
            --card-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.15);
            --toggle-bg: rgba(99, 102, 241, 0.08);
            --toggle-border: rgba(99, 102, 241, 0.2);
            --particle-color: rgba(168, 85, 247, 0.06);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem 1rem;
            color: var(--text-main);
        }

        /* ── Theme Toggle Button ── */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .theme-toggle .icon-sun  { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun  { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* ── Animated Background Particles ── */
        .bg-particles {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to   { transform: translate(100px, 100px); }
        }

        /* ── Login Card ── */
        .login-card {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px;
            padding: 2.5rem 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin: auto;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-header { text-align: center; margin-bottom: 2.5rem; }
        .logo-box {
            width: 72px; height: 72px;
            background: var(--primary-gradient);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            box-shadow: 0 10px 25px var(--accent-glow);
            animation: pulse 4s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 25px var(--accent-glow); transform: scale(1); }
            50%       { box-shadow: 0 15px 35px rgba(168,85,247,0.6); transform: scale(1.05); }
        }
        .app-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.4rem; font-weight: 700; letter-spacing: -1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { font-size: 0.95rem; color: var(--text-dim); font-weight: 400; }

        /* ── Form Elements ── */
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .label {
            display: block; font-size: 0.75rem; font-weight: 700;
            color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 0.6rem; margin-left: 0.5rem;
        }
        .input-wrapper {
            position: relative;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex; align-items: center;
        }
        .input-wrapper i { padding: 0 1rem; color: var(--text-dim); font-size: 1.1rem; }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 1.1rem 1rem 1.1rem 0;
            color: var(--input-color); font-size: 1rem; outline: none;
        }
        .input-wrapper input::placeholder { color: var(--text-dim); }
        .input-wrapper:focus-within {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
        }
        .toggle-password { cursor: pointer; padding: 0 1.2rem !important; transition: color 0.2s; }
        .toggle-password:hover { color: var(--text-main) !important; }

        /* ── Extra Actions ── */
        .extra-actions {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding: 0 0.5rem;
        }
        .remember-me {
            display: flex; align-items: center; gap: 0.6rem;
            cursor: pointer; font-size: 0.88rem; color: var(--text-dim);
        }
        .remember-me input { accent-color: #a855f7; width: 16px; height: 16px; }
        .forgot-link {
            font-size: 0.88rem; color: #a855f7; text-decoration: none;
            font-weight: 500; transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.8; }

        /* ── Main Button ── */
        .btn-access {
            width: 100%; background: var(--primary-gradient);
            color: #fff; border: none; padding: 1.2rem; border-radius: 16px;
            font-size: 1.1rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 0.8rem;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-access:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(99,102,241,0.45); }
        .btn-access:active { transform: translateY(0); }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 2rem 0; color: var(--text-dim); font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--glass-border);
        }

        /* ── Footer ── */
        .secure-footer {
            display: flex; align-items: center; justify-content: center;
            gap: 0.6rem; color: var(--text-dim); font-size: 0.88rem; margin-bottom: 2rem;
        }
        .secure-footer i { color: #10b981; }

        /* ── Credential Hint ── */
        .cred-hint {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 1.2rem;
        }
        .cred-hint i { color: #6366f1; font-size: 0.85rem; flex-shrink: 0; }
        .cred-hint b { color: var(--text-main); }
        .reg-hint {
            background: rgba(16, 185, 129, 0.07);
            border-color: rgba(16, 185, 129, 0.25);
        }
        .reg-hint i { color: #10b981; }

        .copyright {
            position: absolute; bottom: 2rem; left: 0;
            width: 100%; text-align: center;
            font-size: 0.8rem; color: var(--text-dim);
            opacity: 0.4;
        }

        /* ── Tab Switcher ── */
        .tab-bar {
            display: flex;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 2rem;
            position: relative;
        }
        .tab-btn {
            flex: 1; padding: 0.65rem; border: none; background: transparent;
            color: var(--text-dim); font-size: 0.9rem; font-weight: 600;
            border-radius: 10px; cursor: pointer; transition: color 0.3s;
            z-index: 1; position: relative;
        }
        .tab-btn.active { color: #fff; }
        .tab-slider {
            position: absolute; top: 4px; left: 4px;
            width: calc(50% - 4px); height: calc(100% - 8px);
            background: var(--primary-gradient);
            border-radius: 10px;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
        }
        .tab-slider.register { transform: translateX(100%); }

        /* ── Form Panels ── */
        .forms-wrapper { overflow: hidden; position: relative; }
        .forms-inner {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .form-panel { min-width: 100%; }
        .forms-inner.show-register { transform: translateX(-100%); }

        /* ── Toast Notification ── */
        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #1e1b4b; color: #fff;
            padding: 0.9rem 1.6rem; border-radius: 50px;
            font-size: 0.9rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.6rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
            opacity: 0; z-index: 9999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success i { color: #10b981; }
        .toast.error   i { color: #ef4444; }
        [data-theme="light"] .toast { background: #1e1b4b; }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card { margin: 1rem; padding: 2.5rem 1.5rem; }
            .app-title  { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light theme">
        <i class="fa-solid fa-moon icon-moon"></i>
        <i class="fa-solid fa-sun icon-sun"></i>
    </button>

    <div class="bg-particles" id="particles"></div>

    <div class="login-card">
        <div class="card-header">
            <div class="logo-box">
                <i class="fa-solid fa-newspaper"></i>
            </div>
            <h1 class="app-title">NewsClassifier</h1>
            <p class="subtitle">Intelligence for modern newsrooms</p>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-slider" id="tabSlider"></div>
            <button class="tab-btn active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn"        id="tabReg"    onclick="switchTab('register')">Register</button>
        </div>

        <!-- Forms Wrapper -->
        <div class="forms-wrapper">
            <div class="forms-inner" id="formsInner">

                <!-- LOGIN PANEL -->
                <div class="form-panel">
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="label">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="login-email" placeholder="admin@news.com" autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Username</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="login-username" placeholder="admin" autocomplete="username">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                                <i class="fa-solid fa-eye toggle-password" id="eye"></i>
                            </div>
                        </div>
                        <div class="extra-actions">
                            <label class="remember-me">
                                <input type="checkbox" id="rememberMe"> Remember me
                            </label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <!-- Default credentials hint -->
                        <div class="cred-hint">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>Demo: <b>admin@news.com</b> &nbsp;·&nbsp; user: <b>admin</b> &nbsp;·&nbsp; pass: <b>news@123</b></span>
                        </div>
                        <button type="submit" class="btn-access" id="loginBtn">
                            Sign In &nbsp;<i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                </div>

                <!-- REGISTER PANEL -->
                <div class="form-panel">
                    <form id="registerForm">
                        <div class="form-group">
                            <label class="label">Full Name</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-id-card"></i>
                                <input type="text" id="reg-name" placeholder="John Doe" autocomplete="name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Username</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="reg-username" placeholder="john_doe" autocomplete="username">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Email</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="reg-email" placeholder="john@example.com" autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password">
                                <i class="fa-solid fa-eye toggle-password" id="reg-eye"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-shield-halved"></i>
                                <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password">
                            </div>
                        </div>
                        <!-- Register email format hint -->
                        <div class="cred-hint reg-hint">
                            <i class="fa-solid fa-circle-info"></i>
                            <span>Use format: <b>yourname@domain.com</b> &nbsp;·&nbsp; Password min. <b>6 chars</b></span>
                        </div>
                        <button type="submit" class="btn-access" id="registerBtn">
                            Create Account <i class="fa-solid fa-user-plus"></i>
                        </button>
                    </form>
                </div>

            </div><!-- /forms-inner -->
        </div><!-- /forms-wrapper -->

        <div class="divider">or</div>
        <div class="secure-footer">
            <i class="fa-solid fa-shield-halved"></i>
            <span>End-to-end encrypted &amp; secure</span>
        </div>
    </div>

    <div class="copyright">
        © 2025 NewsClassifier. All rights reserved.
    </div>

    <!-- Toast Element -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ── Theme Management ──
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('nc_theme', theme);
        }

        // Load saved theme on page load
        const savedTheme = localStorage.getItem('nc_theme') || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        // ── Authentication Logic ──
        const loginForm = document.getElementById('loginForm');
        const API_URL = "http://localhost:8000";

        // Pre-fill email + username if remember-me was checked
        const savedEmail    = localStorage.getItem('nc_remember_email');
        const savedUsername = localStorage.getItem('nc_remember_username');
        if (savedEmail) {
            document.getElementById('login-email').value    = savedEmail;
            document.getElementById('login-username').value = savedUsername || '';
            document.getElementById('rememberMe').checked   = true;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('login-email').value.trim();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('loginBtn');
            const originalText = submitBtn.innerHTML;

            if (!email || !password) {
                return showToast('error', 'Please enter your email and password.');
            }

            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (remember) {
                        localStorage.setItem('nc_remember_email',    email);
                        localStorage.setItem('nc_remember_username', data.username);
                    } else {
                        localStorage.removeItem('nc_remember_email');
                        localStorage.removeItem('nc_remember_username');
                    }
                    localStorage.setItem('user', JSON.stringify(data));
                    showToast('success', `Welcome back, ${data.username}!`);
                    setTimeout(() => window.location.href = 'dashboard.html', 900);
                } else {
                    const err = await response.json();
                    showToast('error', err.detail || 'Authentication failed');
                }
            } catch (err) {
                console.error(err);
                showToast('error', 'Cannot reach server. Is api.py running?');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // ── Tab Switcher ──
        function switchTab(tab) {
            const slider   = document.getElementById('tabSlider');
            const inner    = document.getElementById('formsInner');
            const btnLogin = document.getElementById('tabLogin');
            const btnReg   = document.getElementById('tabReg');
            if (tab === 'register') {
                slider.classList.add('register');
                inner.classList.add('show-register');
                btnLogin.classList.remove('active');
                btnReg.classList.add('active');
            } else {
                slider.classList.remove('register');
                inner.classList.remove('show-register');
                btnReg.classList.remove('active');
                btnLogin.classList.add('active');
            }
        }

        // ── Toast Helper ──
        let toastTimer;
        function showToast(type, msg) {
            const toast   = document.getElementById('toast');
            const icon    = document.getElementById('toastIcon');
            const msgSpan = document.getElementById('toastMsg');
            icon.className = type === 'success'
                ? 'fa-solid fa-circle-check'
                : 'fa-solid fa-circle-xmark';
            toast.className = `toast ${type}`;
            msgSpan.textContent = msg;
            // Trigger show
            requestAnimationFrame(() => toast.classList.add('show'));
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ── Register Form ──
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name     = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm  = document.getElementById('reg-confirm').value;
            const btn      = e.target.querySelector('.btn-access');

            if (!name || !username || !email || !password) {
                return showToast('error', 'Please fill in all fields.');
            }
            if (password.length < 6) {
                return showToast('error', 'Password must be at least 6 characters.');
            }
            if (password !== confirm) {
                return showToast('error', 'Passwords do not match.');
            }

            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, full_name: name })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('success', 'Account created! Switching to Sign In...');
                    e.target.reset();
                    setTimeout(() => switchTab('login'), 1400);
                } else {
                    showToast('error', data.detail || 'Registration failed.');
                }
            } catch {
                showToast('error', 'Cannot reach server. Is api.py running?');
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        });

        // ── Register password eye toggle ──
        const regPass = document.getElementById('reg-password');
        const regEye  = document.getElementById('reg-eye');
        regEye.addEventListener('click', () => {
            const isPass = regPass.type === 'password';
            regPass.type = isPass ? 'text' : 'password';
            regEye.classList.toggle('fa-eye');
            regEye.classList.toggle('fa-eye-slash');
        });


        // ── Password Visibility Toggle ──
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye');
        eyeIcon.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        // ── Background Particles Generation ──
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 5; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 400 + 300;
            p.style.width  = size + 'px';
            p.style.height = size + 'px';
            p.style.left   = Math.random() * 100 + '%';
            p.style.top    = Math.random() * 100 + '%';
            p.style.animationDelay    = (Math.random() * 10) + 's';
            p.style.animationDuration = (Math.random() * 10 + 15) + 's';
            particlesContainer.appendChild(p);
        }
    </script>
</body>
</html>
